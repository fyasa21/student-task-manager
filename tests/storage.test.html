<!doctype html>
<html>
  <head>
    <title>Storage Test</title>
  </head>
  <body>
    <h1>Testing storage.js</h1>

    <script type="module">
      import { Storage } from "../src/storage.js";

      console.log("TEST START");

      // === TEST ADD ===
      const before = Storage.getTasks().length;
      const newTask = Storage.addTask({
        title: "Unit Test",
        description: "Testing",
        status: "todo",
        projectId: "p1",
      });
      const after = Storage.getTasks().length;

      console.log(after === before + 1 ? "✅ addTask PASS" : "❌ addTask FAIL");

      // === TEST UPDATE ===
      Storage.updateTask(newTask.id, { status: "done" });
      const updated = Storage.getTasks().find((t) => t.id === newTask.id);

      console.log(
        updated.status === "done" ? "✅ updateTask PASS" : "❌ updateTask FAIL",
      );

      // === TEST DELETE ===
      Storage.deleteTask(newTask.id);
      const exists = Storage.getTasks().find((t) => t.id === newTask.id);

      console.log(!exists ? "✅ deleteTask PASS" : "❌ deleteTask FAIL");

      // === TEST STATS ===
      const stats = Storage.getStats();

      console.log(
        typeof stats.total === "number"
          ? "✅ getStats PASS"
          : "❌ getStats FAIL",
      );

      console.log("TEST END");
    </script>
  </body>
</html>
